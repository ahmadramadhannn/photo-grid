<div class="app-shell">
  <header class="app-header">
    <app-toolbar [config]="config()" (configChange)="onConfigChange($event)" (exportRequest)="onExport()" />
  </header>

  <main class="app-main">
    @if (config().mode === 'grid') {
    <app-grid-canvas [config]="config()" />
    } @else {
    <app-freestyle-canvas [config]="config()" />
    }
  </main>

  <!-- Floating Photo Drawer (grid mode only) -->
  @if (config().mode === 'grid') {
  <app-photo-drawer [photos]="gridPhotos()" (photoRemoved)="onDrawerPhotoRemoved($event)"
    (allPhotosCleared)="onDrawerClearAll()" />
  }

  <footer class="app-footer">
    <span class="app-footer__text">
      PhotoGrid — Drop, arrange, export. ✦
    </span>
  </footer>
</div>
