<div class="cell" [class.cell--has-photo]="photoUrl()" [class.cell--drag-over]="isDragOver()"
    [style.clip-path]="clipPath" (click)="onCellClick()" (mouseenter)="isHovering.set(true)"
    (mouseleave)="isHovering.set(false)" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)" (wheel)="onWheel($event)" (pointerdown)="onPanStart($event)"
    (pointermove)="onPanMove($event)" (pointerup)="onPanEnd()" (pointerleave)="onPanEnd()" role="button" tabindex="0"
    [attr.aria-label]="photoUrl() ? 'Photo cell ' + cellIndex() : 'Upload photo to cell ' + cellIndex()">
    @if (photoUrl()) {
    <img class="cell__image" [src]="photoUrl()" alt="Grid photo" draggable="false" [style.transform]="imageTransform" />

    @if (isHovering()) {
    <div class="cell__overlay" (click)="$event.stopPropagation()">
        <!-- Zoom controls -->
        <div class="cell__zoom-controls">
            <button class="cell__action cell__action--sm" (click)="onZoomOut($event)" title="Zoom out">
                <span>−</span>
            </button>
            <span class="cell__zoom-label">{{ (zoom().scale * 100).toFixed(0) }}%</span>
            <button class="cell__action cell__action--sm" (click)="onZoomIn($event)" title="Zoom in">
                <span>+</span>
            </button>
            @if (zoom().scale !== 1 || zoom().offsetX !== 0 || zoom().offsetY !== 0) {
            <button class="cell__action cell__action--sm" (click)="onResetZoom($event)" title="Reset zoom">
                <span>↺</span>
            </button>
            }
        </div>
        <!-- Photo actions -->
        <div class="cell__photo-actions">
            <button class="cell__action" (click)="onReplace()" title="Replace photo">
                <span>🔄</span>
            </button>
            <button class="cell__action cell__action--danger" (click)="onRemove($event)" title="Remove photo">
                <span>✕</span>
            </button>
        </div>
    </div>
    }
    } @else {
    <div class="cell__placeholder">
        <div class="cell__upload-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
        </div>
        <span class="cell__upload-text">Drop or click</span>
    </div>
    }

    <input #fileInput type="file" accept="image/*" class="cell__file-input" (change)="onFileSelected($event)"
        [id]="'file-input-' + cellIndex()" />
</div>
