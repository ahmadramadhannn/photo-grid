<!-- Toggle FAB -->
<button class="drawer-fab" [class.drawer-fab--has-photos]="uploadedCount() > 0" (click)="toggle()"
    [title]="isOpen() ? 'Close photo list' : 'View uploaded photos'" id="photo-drawer-toggle">
    @if (isOpen()) {
    <span>✕</span>
    } @else {
    <span class="drawer-fab__icon">🖼</span>
    @if (uploadedCount() > 0) {
    <span class="drawer-fab__badge">{{ uploadedCount() }}</span>
    }
    }
</button>

<!-- Drawer Panel -->
@if (isOpen()) {
<div class="drawer glass-card" (click)="$event.stopPropagation()">
    <div class="drawer__header">
        <h3 class="drawer__title">Photos</h3>
        <span class="drawer__count">{{ uploadedCount() }}</span>
        @if (uploadedCount() > 0) {
        <button class="drawer__clear-btn" (click)="onClearAll()" title="Remove all photos" id="clear-all-photos">
            Clear All
        </button>
        }
    </div>

    <div class="drawer__list">
        @if (uploadedCount() === 0) {
        <div class="drawer__empty">
            <span class="drawer__empty-icon">📷</span>
            <p>No photos yet</p>
        </div>
        } @else {
        @for (photo of uploadedPhotos(); track photo.index) {
        <div class="drawer__item">
            <img class="drawer__thumb" [src]="photo.url" [alt]="'Photo in cell ' + photo.index" draggable="false" />
            <span class="drawer__item-label">Cell {{ photo.index + 1 }}</span>
            <button class="drawer__remove-btn" (click)="onRemovePhoto(photo.index)" title="Remove this photo"
                [id]="'remove-photo-' + photo.index">
                ✕
            </button>
        </div>
        }
        }
    </div>
</div>
}
